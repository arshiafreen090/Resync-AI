<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up - Resync AI</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,300&display=swap"
        rel="stylesheet">
    <link rel="icon" href="assets/favicon.svg" type="image/svg+xml">
    <link rel="stylesheet" href="css/style.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>

<body>
    <div class="auth-page">
        <video class="auth-video-bg" autoplay muted loop playsinline>
            <source src="assets/auth-bg.mp4" type="video/mp4">
        </video>
        <div class="auth-overlay"></div>
        <div class="auth-footer-text">© 2026 Resync AI</div>

        <div class="auth-card">
            <div class="auth-noise-overlay"></div>

            <div class="auth-logo-wrap">
                <a href="resync-ai-landing.html" style="display:flex; align-items:center; justify-content:center;">
                    <img src="assets/logo-dark.svg" alt="Resync AI"
                        style="height: 32px; width: auto; object-fit: contain;">
                </a>
            </div>

            <h1 class="auth-title">Create your account</h1>
            <p class="auth-subtitle">Start tailoring your resume to every job.</p>

            <div class="auth-divider"></div>

            <button id="google-signup-btn" class="btn-google">
                <svg class="google-icon" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                    <path
                        d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"
                        fill="#4285F4" />
                    <path
                        d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.15v2.84C3.99 20.53 7.7 23 12 23z"
                        fill="#34A853" />
                    <path
                        d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.15C1.43 8.55 1 10.22 1 12s.43 3.45 1.15 4.93l3.69-2.84z"
                        fill="#FBBC05" />
                    <path
                        d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.15 7.07l3.69 2.84c.87-2.6 3.3-4.53 6.16-4.53z"
                        fill="#EA4335" />
                </svg>
                <div class="spinner"></div>
                Continue with Google
            </button>

            <div class="auth-method-divider">
                <span>or continue with email</span>
            </div>

            <form id="email-signup-form" class="auth-form">
                <div class="auth-input-group">
                    <input type="email" id="email" class="auth-input" placeholder="your@email.com" required>
                </div>
                <div class="auth-input-group">
                    <input type="password" id="password" class="auth-input" placeholder="Password" required>
                    <button type="button" class="auth-pwd-toggle" id="toggle-pwd" tabindex="-1">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="16"
                            height="16">
                            <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
                            <circle cx="12" cy="12" r="3"></circle>
                        </svg>
                    </button>
                </div>
                <div class="auth-input-group">
                    <input type="password" id="confirm-password" class="auth-input" placeholder="Confirm Password"
                        required>
                </div>

                <button type="submit" class="btn-auth-submit" id="email-submit-btn">
                    <div class="spinner"></div>
                    <span class="btn-text">Create Account</span>
                </button>
                <div id="auth-msg" class="auth-msg"></div>
            </form>

            <a href="signin.html" class="auth-switch">Already have an account? Sign in &rarr;</a>

            <p class="auth-legal">By continuing, you agree to our Terms and Privacy Policy</p>
        </div>
    </div>

    <script>
        const { createClient } = supabase;
        const _supabase = createClient(
            'https://cerxlqvtwegaizkecfds.supabase.co',
            'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImNlcnhscXZ0d2VnYWl6a2VjZmRzIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMyNTQwMjgsImV4cCI6MjA4ODgzMDAyOH0.DwjWcd788lMjjWYnbY6LzTFLpSm6Yct4NcOr2h--UiM'
        );

        // Initial session redirect
        _supabase.auth.getSession().then(({ data: { session } }) => {
            if (session) {
                window.location.href = '/dashboard.html';
            }
        });

        // Button handling for Google
        const btn = document.getElementById('google-signup-btn');
        btn.addEventListener('click', async () => {
            btn.classList.add('loading');
            btn.disabled = true;
            try {
                await _supabase.auth.signInWithOAuth({
                    provider: 'google',
                    options: {
                        redirectTo: window.location.origin + '/dashboard.html'
                    }
                });
            } catch (err) {
                console.error('Error signing up:', err);
                btn.classList.remove('loading');
                btn.disabled = false;
            }
        });

        // Email UI elements & Logic
        const emailForm = document.getElementById('email-signup-form');
        const emailInput = document.getElementById('email');
        const passwordInput = document.getElementById('password');
        const confirmPasswordInput = document.getElementById('confirm-password');
        const emailBtn = document.getElementById('email-submit-btn');
        const msgDiv = document.getElementById('auth-msg');

        function showMessage(msg, isError = true) {
            msgDiv.textContent = msg;
            msgDiv.style.display = 'block';
            if (isError) {
                msgDiv.classList.add('error');
                msgDiv.classList.remove('success');
            } else {
                msgDiv.classList.add('success');
                msgDiv.classList.remove('error');
            }
        }

        document.getElementById('toggle-pwd').addEventListener('click', () => {
            const type = passwordInput.getAttribute('type') === 'password' ? 'text' : 'password';
            passwordInput.setAttribute('type', type);
        });

        emailForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            msgDiv.style.display = 'none';

            if (passwordInput.value !== confirmPasswordInput.value) {
                showMessage("Passwords don't match");
                return;
            }

            emailBtn.classList.add('loading');
            emailBtn.disabled = true;

            const { data, error } = await _supabase.auth.signUp({
                email: emailInput.value,
                password: passwordInput.value,
                options: {
                    emailRedirectTo: window.location.origin + '/dashboard.html'
                }
            });

            emailBtn.classList.remove('loading');
            emailBtn.disabled = false;

            if (error) {
                showMessage(error.message, true);
            } else {
                showMessage('Check your email to confirm your account!', false);
                emailForm.reset();
            }
        });
    </script>
</body>

</html>
