<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Resync AI — Tailor Your Resume. Land the Job.</title>

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,300&display=swap"

  <!-- Styles -->
  <link rel="stylesheet" href="css/style.css">
</head>

<body>

  <!-- Custom Cursor -->
  <div class="cursor" id="cursor"></div>
  <div class="cursor-follower" id="cursorFollower"></div>

  <!-- NAV -->
  <nav data-component="navbar"></nav>

  <!-- HERO -->
  <section id="hero" data-component="hero"></section>

  <!-- TICKER -->
  <div data-component="ticker"></div>



  <!-- FEATURES -->
  <section id="features" data-component="features"></section>

  <!-- PLATFORM LOGOS SECTION -->
  <section id="platform-logos" data-component="platform-logos" class="platform-logos-section">
    <div class="max-w">
      <h2 class="platform-heading">Optimized for applications on</h2>
      <div class="logo-carousel">
        <div class="logo-track">
          <img src="assets/logos/linkedin.svg" alt="LinkedIn" class="logo-item" />
          <img src="assets/logos/indeed.svg" alt="Indeed" class="logo-item" />
          <img src="assets/logos/glassdoor.svg" alt="Glassdoor" class="logo-item" />
          <img src="assets/logos/unstop.svg" alt="Unstop" class="logo-item" />
          <!-- duplicate -->
          <img src="assets/logos/linkedin.svg" alt="LinkedIn" class="logo-item" />
          <img src="assets/logos/indeed.svg" alt="Indeed" class="logo-item" />
          <img src="assets/logos/glassdoor.svg" alt="Glassdoor" class="logo-item" />
          <img src="assets/logos/unstop.svg" alt="Unstop" class="logo-item" />
          <!-- duplicate -->
          <img src="assets/logos/linkedin.svg" alt="LinkedIn" class="logo-item" />
          <img src="assets/logos/indeed.svg" alt="Indeed" class="logo-item" />
          <img src="assets/logos/glassdoor.svg" alt="Glassdoor" class="logo-item" />
          <img src="assets/logos/unstop.svg" alt="Unstop" class="logo-item" />
        </div>
      </div>
    </div>
  </section>

  <!-- HOW IT WORKS -->
  <section id="how-it-works" data-component="how-it-works"></section>

  <!-- DETAIL BLOCKS -->
  <section id="details" data-component="details"></section>

  <!-- STATS -->
  <section id="stats" data-component="stats"></section>

  <!-- TESTIMONIALS -->
  <section id="testimonials" data-component="testimonials"></section>

  <!-- PRICING -->
  <section id="pricing" data-component="pricing"></section>

  <!-- CTA -->
  <section id="cta" data-component="cta"></section>

  <!-- FOOTER -->
  <footer data-component="footer"></footer>

  <!-- Scripts -->
  <script src="js/glow-effect.js" defer></script>
  <script src="js/main.js" defer></script>
  <script src="js/component-loader.js" defer></script>
</body>

</html>
